# abcde configuration

# Output formats
OUTPUTTYPE="flac"

# Drive
CDROM=/dev/sr0
CDROMREADERSYNTAX=cdparanoia

# Output directory and filename structure
OUTPUTDIR=~/Music
OUTPUTFORMAT='${ARTISTFILE}/${ALBUMFILE}/${TRACKNUM} - ${TRACKFILE}'

# Encoder options
FLACOPTS='-s -8'
LAMEOPTS='--preset extreme'

# Editor for manual metadata editing
CDDBEDITOR=nvim

# Use MusicBrainz first, fall back to gnudb
CDDBMETHOD=musicbrainz,cddb
CDDBURL=http://gnudb.gnudb.org/~cddb/cddb.cgi

# Fetch and embed cover art from MusicBrainz Cover Art Archive
EMBEDCOVERART=y

# Eject when done
EJECTCD=y

# Clean up temp files on completion
CLEANCOMPLETE=y
